                    { type: "phrase", text: "An adorable furry friend", ipa: "/ən əˈdɔːrəbl ˈfɜːri frend/", meaning: "Một người bạn có lông đáng yêu" },

                    { type: "phrase", text: "Wag its tail happily", ipa: "/wæɡ ɪts teɪl ˈhæpɪli/", meaning: "Vẫy đuôi mừng vui vẻ" },
                    { type: "phrase", text: "Purr softly on my lap", ipa: "/pɜːr ˈsɒftli ɒn maɪ læp/", meaning: "Kêu gừ gừ nhẹ nhàng trên lòng tôi" },
                    { type: "phrase", text: "Feed the pets on time", ipa: "/fiːd ðə pets ɒn taɪm/", meaning: "Cho thú cưng ăn đúng giờ" },

                    { type: "sentence", text: "My little cat chases a ball of yarn", meaning: "Chú mèo nhỏ của tôi đang đuổi theo cuộn len" },
                    { type: "sentence", text: "Birds build their nests high in the trees", meaning: "Chim làm tổ trên cao ở những tán cây" },
                    { type: "sentence", text: "Wild animals live freely in nature", meaning: "Động vật hoang dã sống tự do trong tự nhiên" },

                    // Phần 5: Các câu hỏi và câu cảm thán mở rộng nâng cao
                    { type: "sentence", text: "What kind of pets do you like best?", meaning: "Bạn thích loại thú cưng nào nhất?" },
                    { type: "sentence", text: "How do you help your parents at home?", meaning: "Bạn giúp đỡ bố mẹ ở nhà bằng cách nào?" },
                    { type: "sentence", text: "Nothing is more valuable than family love", meaning: "Không có gì quý giá hơn tình cảm gia đình" },
                    { type: "sentence", text: "Let us make our home a peaceful place", meaning: "Hãy cùng nhau biến ngôi nhà thành nơi bình yên" },
                    { type: "sentence", text: "Pets make our daily life much brighter", meaning: "Thú cưng làm cho cuộc sống hằng ngày tươi sáng hơn" },
                    { type: "sentence", text: "Always cherish every moment with your family", meaning: "Hãy luôn trân trọng từng khoảnh khắc bên gia đình" },
                    { type: "sentence", text: "Brighter smiles come from sharing happiness", meaning: "Những nụ cười rạng rỡ bắt nguồn từ việc sẻ chia hạnh phúc" },
                    { type: "sentence", text: "Animals are truly our faithful companions", meaning: "Động vật thực sự là những người bạn đồng hành trung thành" },
                    { type: "sentence", text: "Building a strong family takes time and love", meaning: "Xây dựng một gia đình vững chắc cần thời gian và tình yêu" },
                    { type: "sentence", text: "Have a wonderful journey exploring English", meaning: "Chúc bạn có một hành trình khám phá tiếng Anh thật tuyệt vời" }

        };

        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('lesson') || "1";
        
        const currentLesson = lessonsData[lessonId] || lessonsData["1"];
        document.getElementById('lesson-subtitle').innerText = currentLesson.title;

        let originalItems = [...currentLesson.items];
        let activeItems = [];
        let itemIndices = [];
        let itemStatus = [];
        let currentIndex = 0;
        let totalSeconds = 50 * 30; // 25 phút tổng cộng
        let initialSeconds = 50 * 30; 
        let timerInterval;
        let lastSessionMessage = "🎉 HOÀN THÀNH BÀI LUYỆN TẬP PHÁT ÂM NÂNG CAO!";

        function getBestEnglishVoice(speechInstance) {
            const voices = window.speechSynthesis.getVoices();
            let selectedVoice = voices.find(v => v.lang === 'en-US' && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('En-US')));
            if (!selectedVoice) {
                selectedVoice = voices.find(v => v.lang === 'en-US' || v.lang === 'en_US');
            }
            if (!selectedVoice && voices.length > 0) {
                selectedVoice = voices.find(v => v.lang.startsWith('en'));
            }
            if (selectedVoice) {
                speechInstance.voice = selectedVoice;
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        function initQuiz() {
            let combined = originalItems.map((item, index) => ({ item, index }));
            activeItems = combined.map(item => item.item);
            itemIndices = combined.map(item => item.index);
            itemStatus = new Array(originalItems.length).fill('pending');
            currentIndex = 0;
            totalSeconds = 50 * 30; 
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    let minutes = Math.floor(totalSeconds / 60);
                    let seconds = totalSeconds % 60;
                    const timeDisplay = document.getElementById('time-display');
                    if (timeDisplay) {
                        timeDisplay.innerText = (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
                    }

                    if (totalSeconds <= 180) {
                        const timerBox = document.getElementById('timer-box');
                        if (timerBox) timerBox.classList.add('blink-red');
                    }
                } else {
                    clearInterval(timerInterval);
                    finishSession("⏰ Đã hết thời gian làm bài!");
                }
            }, 1000);
        }

        function showQuestion() {
            if (currentIndex < activeItems.length) {
                const currentItem = activeItems[currentIndex];
                let displayHtml = "";
                
                if (currentItem.type === "phrase") {
                    displayHtml = `
                        <div style="font-size: 13px; color: #8e44ad; font-weight: bold; margin-bottom: 2px; text-transform: uppercase;">CỤM TỪ / COLLOCATION (CHÚ Ý LINKING SOUND)</div>
                        <div>${currentItem.text}</div>
                        <div style="font-size: 15px; color: #9b59b6; font-weight: normal; margin-top: 4px;">Phiên âm: ${currentItem.ipa}</div>
                        <div class="vietnamese-translation">Nghĩa: ${currentItem.meaning}</div>
                    `;
                } else {
                    displayHtml = `
                        <div style="font-size: 13px; color: #9b59b6; font-weight: bold; margin-bottom: 2px; text-transform: uppercase;">CÂU GIAO TIẾP NÂNG CAO</div>
                        <div>${currentItem.text.charAt(0).toUpperCase() + currentItem.text.slice(1)}</div>
                        <div class="vietnamese-translation">Nghĩa: ${currentItem.meaning}</div>
                    `;
                }

                document.getElementById('question').innerHTML = displayHtml;
                document.getElementById('progress').innerHTML = "Câu hỏi: <span>" + (currentIndex + 1) + "</span> / " + activeItems.length;
                document.getElementById('status').innerText = "Sẵn sàng...";
                document.getElementById('error').innerText = "";

                const statusTag = document.getElementById('item-status');
                const realIdx = itemIndices[currentIndex];
                const currentSt = itemStatus[realIdx];
                
                if (currentSt === 'passed') {
                    statusTag.className = "status-passed";
                    statusTag.innerText = "✅ Trạng thái: Đạt";
                } else if (currentSt === 'approx') {
                    statusTag.className = "status-approx";
                    statusTag.innerText = "🟡 Trạng thái: Gần đúng (Chưa đạt)";
                } else if (currentSt === 'skipped') {
                    statusTag.className = "status-skipped";
                    statusTag.innerText = "⏭️ Trạng thái: Đã bỏ qua";
                } else {
                    statusTag.className = "status-pending";
                    statusTag.innerText = "⏳ Trạng thái: Chưa hoàn thành";
                }

                if (currentIndex === 0) {
                    document.getElementById('prev-btn').style.display = 'none';
                } else {
                    document.getElementById('prev-btn').style.display = 'inline-block';
                }

                const skipBtn = document.getElementById('skip-btn');
                if (currentIndex === activeItems.length - 1) {
                    skipBtn.innerText = "📥 Nộp bài";
                    skipBtn.style.background = "#28a745";
                } else {
                    skipBtn.innerText = "⏭️ Câu tiếp";
                    skipBtn.style.background = "#6c757d";
                }
            } else {
                finishSession("🎉 HOÀN THÀNH BÀI LUYỆN TẬP PHÁT ÂM NÂNG CAO!");
            }
        }

        function getSimilarityScore(s1, s2) {
            let longer = s1;
            let shorter = s2;
            if (s1.length < s2.length) {
                longer = s2;
                shorter = s1;
            }
            let longerLength = longer.length;
            if (longerLength === 0) {
                return 1.0;
            }
            return (longerLength - editDistance(longer, shorter)) / parseFloat(longerLength);
        }

        function editDistance(s1, s2) {
            s1 = s1.toLowerCase();
            s2 = s2.toLowerCase();
            let costs = new Array();
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i == 0)
                        costs[j] = j;
                    else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (s1.charAt(i - 1) != s2.charAt(j - 1))
                                newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (s1.length > 0)
                    costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        function finishSession(message) {
            clearInterval(timerInterval);
            lastSessionMessage = message;
            
            let usedSeconds = initialSeconds - totalSeconds;
            if (usedSeconds < 0) usedSeconds = 0;
            
            let uMin = Math.floor(usedSeconds / 60);
            let uSec = usedSeconds % 60;
            let timeUsedFormatted = (uMin < 10 ? "0" : "") + uMin + ":" + (uSec < 10 ? "0" : "") + uSec;

            let rMin = Math.floor(totalSeconds / 60);
            let rSec = totalSeconds % 60;
            let timeLeftFormatted = (rMin < 10 ? "0" : "") + rMin + ":" + (rSec < 10 ? "0" : "") + rSec;

            let finalPassed = itemStatus.filter(st => st === 'passed').length;
            let finalApprox = itemStatus.filter(st => st === 'approx').length;
            let finalUnfinishedOrSkipped = itemStatus.filter(st => st === 'skipped' || st === 'pending').length;
            let totalItems = originalItems.length;
            
            let accuracyRate = Math.round((finalPassed / totalItems) * 100);
            let adviceText = accuracyRate >= 80 ? "Xuất sắc! Khả năng phát âm cụm từ của bạn rất chuẩn xác." : "Hãy tiếp tục luyện tập thêm các cụm từ nối âm nhé.";

            const container = document.getElementById('main-container');
            container.innerHTML = `
                <h1>LUYỆN TẬP PHÁT ÂM NÂNG CAO</h1>
                <div class="sub-type">CHỦ ĐỀ: GIA ĐÌNH & CON VẬT (50 CÂU - 30S/CÂU)</div>
                <div id="lesson-subtitle">${currentLesson.title}</div>

                <div class="info-bar" id="top-info-bar" style="display: none;"></div>
                <div id="progress" style="display: none;"></div>
                
                <div id="question">
                    <div class="result-card">
                        <div style="font-size: 18px; font-weight: bold; color: #8e44ad; margin-bottom: 5px;">🎉 ${message}</div>
                        <div style="font-size: 22px; font-weight: bold; color: #212529; margin: 10px 0;">${finalPassed} / ${totalItems}</div>
                        <div style="font-size: 16px; font-weight: bold; color: #495057;">Tỷ lệ đạt chuẩn: ${accuracyRate}%</div>
                        
                        <div style="background: #f3e5f5; padding: 10px; border-radius: 8px; margin: 12px 0; font-size: 14px; color: #4a148c; text-align: left;">
                            <div>⏱️ <b>Thời gian học viên đã làm:</b> ${timeUsedFormatted}</div>
                            <div>⏳ <b>Thời gian còn lại:</b> ${timeLeftFormatted} (trên tổng 25:00)</div>
                        </div>

                        <div style="font-size: 14px; color: #856404; margin-top: 8px;">⚠️ ${adviceText}</div>

                        <div class="stats-box">
                            <div style="border-bottom: 1px solid #dee2e6; padding-bottom: 6px; margin-bottom: 8px; color: #333;">📊 BẢNG THỐNG KÊ CHI TIẾT:</div>
                            <div style="color: #155724;">✅ Số câu ĐÚNG (Đạt): ${finalPassed} câu</div>
                            <div style="color: #0c5460;">🟡 Số câu GẦN ĐÚNG (Chưa đạt): ${finalApprox} câu</div>
                            <div style="color: #721c24;">❌ Số câu chưa đạt / bỏ qua: ${finalUnfinishedOrSkipped} câu</div>
                        </div>

                        <div class="action-buttons">
                            <button class="btn-review" onclick="showReviewScreen()">🔍 Xem lại chi tiết</button>
                            <button class="btn-retry" onclick="restartQuiz()">🔄 Làm lại bài test</button>
                        </div>
                    </div>
                </div>

                <div class="btn-group" id="learning-buttons" style="display: none;"></div>
                <p id="status" style="display: none;"></p>
                <p id="error" style="display: none;"></p>
            `;
        }

        function goBackToResults() {
            finishSession(lastSessionMessage);
        }

        function showReviewScreen() {
            let reviewHtml = `<div style="font-weight: bold; font-size: 16px; margin-bottom: 10px; color: #8e44ad;">🔍 XEM LẠI CHI TIẾT VÀ NGHE LẠI:</div><div id="review-container">`;
            
            originalItems.forEach((item, index) => {
                let st = itemStatus[index];
                let icon = '';
                let colorStyle = '';
                
                if (st === 'passed') {
                    icon = '✅ Đạt (Đúng)';
                    colorStyle = 'color: #155724;';
                } else if (st === 'approx') {
                    icon = '🟡 Gần đúng (Chưa đạt)';
                    colorStyle = 'color: #0c5460;';
                } else if (st === 'skipped') {
                    icon = '⏭️ Đã bỏ qua';
                    colorStyle = 'color: #721c24;';
                } else {
                    icon = '⏳ Chưa hoàn thành';
                    colorStyle = 'color: #721c24;';
                }
                
                let safeText = item.text.replace(/'/g, "\\'");
                let labelPrefix = item.type === "phrase" ? "[Cụm từ] " : "[Câu nói] ";

                reviewHtml += `
                    <div class="review-item" style="${colorStyle}">
                        <div class="review-text-group">
                            <div><b>Câu ${index + 1}:</b> ${labelPrefix}"${item.text}" - <b>${icon}</b></div>
                            <div class="review-trans">${item.meaning}</div>
                        </div>
                        <button class="btn-audio-small" onclick="playSpecificAudio('${safeText}')">🔊 Nghe</button>
                    </div>`;
            });

            reviewHtml += `</div><button class="btn-retry" style="width: 100%; margin-top: 15px;" onclick="goBackToResults()">Quay lại</button>`;
            
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <h1>LUYỆN TẬP PHÁT ÂM NÂNG CAO</h1>
                <div class="sub-type">CHỦ ĐỀ: GIA ĐÌNH & CON VẬT (50 CÂU - 30S/CÂU)</div>
                <div id="lesson-subtitle">${currentLesson.title}</div>
                ${reviewHtml}
            `;
        }

        function playSpecificAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.82; 
                utterance.pitch = 1.0;
                
                getBestEnglishVoice(utterance);

                window.speechSynthesis.speak(utterance);
            }
        }

        function restartQuiz() {
            location.reload();
        }

        function goToPrevious() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }

        function playSampleAudio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const currentText = activeItems[currentIndex].text;
                const utterance = new SpeechSynthesisUtterance(currentText);
                utterance.lang = 'en-US';
                utterance.rate = 0.82;
                utterance.pitch = 1.0;

                getBestEnglishVoice(utterance);

                window.speechSynthesis.speak(utterance);
                document.getElementById('status').innerText = "🔊 Đang phát âm mẫu...";
            } else {
                document.getElementById('error').innerText = "Trình duyệt không hỗ trợ phát âm thanh.";
            }
        }

        function markAsSkipped() {
            const realIdx = itemIndices[currentIndex];
            if (itemStatus[realIdx] !== 'passed' && itemStatus[realIdx] !== 'approx') {
                itemStatus[realIdx] = 'skipped';
            }
            
            if (currentIndex === activeItems.length - 1) {
                finishSession("🎉 NỘP BÀI THÀNH CÔNG!");
            } else {
                currentIndex++;
                showQuestion();
            }
        }

        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                document.getElementById('error').innerText = "Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng dùng Chrome.";
                return;
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                document.getElementById('status').innerText = "🎙️ Đang lắng nghe...";
                document.getElementById('error').innerText = "";
            };

            recognition.onerror = (event) => {
                document.getElementById('status').innerText = "Chưa nhận diện được giọng nói!";
                if (event.error === 'not-allowed') {
                    document.getElementById('error').innerText = "Trình duyệt chưa được cấp quyền Micro. Vui lòng bật Micro trong cài đặt trang web.";
                } else {
                    document.getElementById('error').innerText = "Chưa nghe rõ, vui lòng bấm nói lại.";
                }
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase();
                const targetText = activeItems[currentIndex].text.toLowerCase().replace(/[^a-z0-9 ]/g, "");
                const spokenText = transcript.replace(/[^a-z0-9 ]/g, "");

                const realIdx = itemIndices[currentIndex];
                const similarity = getSimilarityScore(targetText, spokenText);

                if (spokenText.includes(targetText) || targetText.includes(spokenText) || similarity >= 0.95) {
                    itemStatus[realIdx] = 'passed';
                    document.getElementById('status').innerText = "✅ Chính xác!";
                    const statusTag = document.getElementById('item-status');
                    statusTag.className = "status-passed";
                    statusTag.innerText = "✅ Trạng thái: Đạt";

                    setTimeout(() => { 
                        if (currentIndex === activeItems.length - 1) {
                            finishSession("🎉 NỘP BÀI THÀNH CÔNG!");
                        } else {
                            currentIndex++; 
                            showQuestion(); 
                        }
                    }, 1500);

                } else if (similarity >= 0.55) {
                    itemStatus[realIdx] = 'approx';
                    document.getElementById('status').innerText = "🟡 Gần đúng: \"" + transcript + "\". Vẫn tính là chưa đạt, bạn có thể nói lại hoặc bấm Câu tiếp.";
                    const statusTag = document.getElementById('item-status');
                    statusTag.className = "status-approx";
                    statusTag.innerText = "🟡 Trạng thái: Gần đúng (Chưa đạt)";

                } else {
                    document.getElementById('status').innerText = "❌ Bạn nói: \"" + transcript + "\". Thử lại hoặc bấm Bỏ qua/Câu tiếp.";
                }
            };

            recognition.start();
        }

        initQuiz();
        startTimer();
        showQuestion();
    </script>
</body>
</html>
